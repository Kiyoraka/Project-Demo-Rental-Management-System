<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — RentHub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/assets/css/tokens.css" />
  <link rel="stylesheet" href="/assets/css/base.css" />
  <link rel="stylesheet" href="/assets/css/components.css" />
  <link rel="stylesheet" href="/assets/css/layout-public.css" />
  <link rel="stylesheet" href="/assets/css/layout-dashboard.css" />
  <link rel="stylesheet" href="/assets/css/responsive.css" />
</head>
<body>
  <div class="dashboard-shell">
    <div data-partial="admin-sidebar"></div>

    <div class="dashboard-main">
      <div data-partial="admin-topbar"></div>

      <main class="dashboard-content">
        <div class="page-head">
          <h2 class="page-head__title">Dashboard</h2>
        </div>

        <section class="stat-grid mb-6" id="stat-grid"></section>

        <div class="dashboard-split">
          <div class="chart-card">
            <h3 class="chart-card__title">Revenue trend (6 months)</h3>
            <div class="chart-canvas"><canvas id="revenue-chart"></canvas></div>
          </div>
          <div class="panel">
            <header class="panel__header"><h3 class="panel__title">Unread notifications</h3></header>
            <div class="panel__body" id="notif-list-main"></div>
          </div>
        </div>

        <section class="panel mt-6">
          <header class="panel__header">
            <h3 class="panel__title">Recent payments</h3>
            <a href="/admin/reports.html" class="btn btn--link">View all</a>
          </header>
          <div class="panel__body" id="recent-payments"></div>
        </section>
      </main>
    </div>
  </div>

  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script type="module" src="/assets/js/partials.js"></script>
  <script type="module" src="/assets/js/admin/main.js"></script>
</body>
</html>
